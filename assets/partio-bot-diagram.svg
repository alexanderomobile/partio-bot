<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 400" role="img" aria-label="PartioBot architecture">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#57606a"/>
    </marker>
  </defs>
  <rect width="920" height="400" fill="#f6f8fa"/>
  <text x="460" y="34" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#24292f">PartioBot</text>
  <text x="460" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#57606a">Shared expense tracking and settlement in Telegram</text>

  <text x="60" y="92" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#57606a">USER FLOW</text>
  <rect x="40" y="100" width="120" height="54" rx="8" fill="#0088cc"/>
  <text x="100" y="124" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#fff">Telegram</text>
  <text x="100" y="140" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#ddf4ff">group / DM</text>
  <line x1="160" y1="127" x2="185" y2="127" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="190" y="100" width="130" height="54" rx="8" fill="#8250df"/>
  <text x="255" y="124" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#fff">aiogram bot</text>
  <text x="255" y="140" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#fbefff">commands + UI</text>
  <line x1="320" y1="127" x2="345" y2="127" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="350" y="100" width="150" height="54" rx="8" fill="#1a7f37"/>
  <text x="425" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#fff">Party service</text>
  <text x="425" y="136" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#dafbe1">events + expenses</text>
  <text x="425" y="148" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#dafbe1">invite codes</text>
  <line x1="500" y1="127" x2="525" y2="127" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="530" y="100" width="150" height="54" rx="8" fill="#bf8700"/>
  <text x="605" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#fff">Balance engine</text>
  <text x="605" y="136" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#fff8c5">who owes whom</text>
  <text x="605" y="148" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#fff8c5">min transfers</text>
  <line x1="680" y1="127" x2="705" y2="127" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="710" y="100" width="120" height="54" rx="8" fill="#656d76"/>
  <text x="770" y="124" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#fff">MySQL</text>
  <text x="770" y="140" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#f6f8fa">persistent data</text>

  <text x="60" y="200" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#57606a">KEY FEATURES</text>
  <rect x="40" y="208" width="790" height="72" rx="10" fill="#fff" stroke="#d0d7de"/>
  <text x="435" y="236" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#24292f">Create events | add expenses | split balances | settle debts</text>
  <text x="435" y="258" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#57606a">Replaces spreadsheets in chats after trips and group activities</text>

  <rect x="40" y="310" width="790" height="44" rx="8" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="435" y="338" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#57606a">Python | aiogram 3 | FastAPI | SQLAlchemy | MySQL</text>

  <text x="460" y="382" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#57606a">Platform adapter supports Telegram group chats</text>
</svg>
